substitutions:
  _SERVICE: tea-api
  _REGION: asia-east1
  _REPOSITORY: tea-api

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe "${_REPOSITORY}" \
          --location="${_REGION}" \
          --project="$PROJECT_ID" >/dev/null 2>&1 || \
        gcloud artifacts repositories create "${_REPOSITORY}" \
          --repository-format=docker \
          --location="${_REGION}" \
          --project="$PROJECT_ID"

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE_URI="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA"
        sed "s|IMAGE_URI|${IMAGE_URI}|g" service.yaml > /workspace/service.rendered.yaml
        gcloud run services replace /workspace/service.rendered.yaml \
          --region="${_REGION}" \
          --platform=managed

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
